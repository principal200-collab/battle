<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>砲彈射擊對戰</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  font-family: 'Courier New', monospace;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px;
}

h1 {
  font-size: 1.8rem;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #f5c518;
  text-shadow: 0 0 20px rgba(245,197,24,0.4);
  margin-bottom: 12px;
}

#scoreboard {
  display: flex;
  gap: 40px;
  align-items: center;
  margin-bottom: 10px;
}

.score-block { text-align: center; min-width: 140px; }

.score-label { font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 4px; }
.red-label  { color: #ff4d4d; }
.blue-label { color: #4da6ff; }

.hp-bar-wrap {
  background: #111;
  border-radius: 4px;
  height: 14px;
  width: 140px;
  overflow: hidden;
  border: 1px solid #333;
  margin: 0 auto 4px auto;
}

.hp-bar { height: 100%; border-radius: 4px; transition: width 0.4s; }
.red-hp  { background: linear-gradient(90deg, #ff1a1a, #ff6666); }
.blue-hp { background: linear-gradient(90deg, #1a6fff, #66b3ff); }

.score-pts { font-size: 1.1rem; font-weight: bold; }
.red-pts  { color: #ff4d4d; }
.blue-pts { color: #4da6ff; }

#turn-indicator {
  font-size: 0.85rem;
  letter-spacing: 2px;
  padding: 4px 18px;
  border-radius: 20px;
  font-weight: bold;
  background: #333;
  color: #f5c518;
  white-space: nowrap;
}

#canvas-wrap {
  position: relative;
  border: 2px solid #333;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

canvas { display: block; }

#controls {
  display: flex;
  gap: 16px;
  margin-top: 12px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

.ctrl-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.ctrl-label {
  font-size: 0.68rem;
  letter-spacing: 2px;
  color: #888;
}

.angle-display {
  font-size: 1.2rem;
  font-weight: bold;
  min-width: 60px;
  text-align: center;
  color: #f5c518;
}

.btn-row { display: flex; gap: 6px; align-items: center; }

button {
  padding: 8px 18px;
  border: none;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
  font-size: 0.8rem;
  letter-spacing: 1px;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
  font-weight: bold;
}

button:active:not(:disabled) { transform: scale(0.96); }
button:disabled { opacity: 0.35; cursor: default; }

.btn-angle {
  background: #2a2a3e;
  color: #ccc;
  border: 1px solid #444;
  padding: 8px 14px;
}

.btn-fire {
  background: #f5c518;
  color: #111;
  padding: 10px 28px;
  font-size: 1rem;
}

.btn-reset {
  background: #333;
  color: #aaa;
  border: 1px solid #555;
}

#message-bar {
  min-height: 28px;
  margin-top: 8px;
  font-size: 0.9rem;
  letter-spacing: 1px;
  text-align: center;
}

#overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  z-index: 10;
}

#overlay.show { display: flex; }

#overlay h2 {
  font-size: 2.2rem;
  letter-spacing: 6px;
  text-shadow: 0 0 30px currentColor;
}

#overlay p { font-size: 1rem; color: #ccc; letter-spacing: 2px; }

#btn-restart {
  background: #f5c518;
  color: #111;
  padding: 12px 36px;
  font-size: 1rem;
  letter-spacing: 2px;
}

#power-slider { width: 120px; accent-color: #f5c518; }
#power-val { font-size: 1.0rem; font-weight: bold; color: #f5c518; }

.legend {
  display: flex;
  gap: 16px;
  font-size: 0.7rem;
  color: #666;
  margin-top: 6px;
  letter-spacing: 1px;
}
.legend span { display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>

<h1>⚔ 砲彈對戰 ⚔</h1>

<div id="scoreboard">
  <div class="score-block">
    <div class="score-label red-label">▶ 紅軍</div>
    <div class="hp-bar-wrap"><div class="hp-bar red-hp" id="red-hp-bar"></div></div>
    <div class="score-pts red-pts" id="red-score">HP 100 | 得分 0</div>
  </div>

  <div id="turn-indicator">—</div>

  <div class="score-block">
    <div class="score-label blue-label">藍軍 ◀</div>
    <div class="hp-bar-wrap"><div class="hp-bar blue-hp" id="blue-hp-bar"></div></div>
    <div class="score-pts blue-pts" id="blue-score">HP 100 | 得分 0</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <h2 id="overlay-title"></h2>
    <p id="overlay-sub"></p>
    <button id="btn-restart">再來一局</button>
  </div>
</div>

<div id="controls">
  <div class="ctrl-group">
    <span class="ctrl-label">砲管角度</span>
    <div class="btn-row">
      <button class="btn-angle" id="btn-up">▲ +5°</button>
      <div class="angle-display" id="angle-display">45°</div>
      <button class="btn-angle" id="btn-down">▼ -5°</button>
    </div>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">本回合剩餘移動</span>
    <div class="angle-display" id="move-display" style="color:#aaffaa">20px</div>
    <div style="font-size:0.65rem;color:#666;letter-spacing:1px;">← → 鍵移動，每px消耗1分</div>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">發射力道</span>
    <input type="range" id="power-slider" min="30" max="100" value="60">
    <div id="power-val">60%</div>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">操作</span>
    <div class="btn-row">
      <button class="btn-fire" id="btn-fire">🔥 開火</button>
      <button class="btn-reset" id="btn-reset">重置</button>
    </div>
  </div>
</div>

<div class="legend">
  <span>🟡 精準命中 砲塔/車體 (+5分 / -5HP)</span>
  <span>🟠 範圍命中 履帶 (+2分 / -2HP)</span>
  <span>🚗 移動 ←→鍵，每px -1分，上限20px/回合</span>
</div>

<div id="message-bar" style="color:#f5c518">載入中…</div>

<script>
(function () {
  // ── Constants ──────────────────────────────────────────────────────────────
  var W = 780, H = 340;
  var GRAVITY   = 0.22;
  var GROUND_Y  = H - 50;
  var PRECISE_R  = 10;
  var RANGE_R    = 30;
  var MAX_HP     = 100;
  var MAX_MOVE   = 20;  // max pixels per turn
  var TRAIL_LEN  = 40;

  // ── DOM refs (safe: bound to document) ───────────────────────────────────
  var elRedScore    = document.getElementById('red-score');
  var elBlueScore   = document.getElementById('blue-score');
  var elRedHpBar    = document.getElementById('red-hp-bar');
  var elBlueHpBar   = document.getElementById('blue-hp-bar');
  var elTurnInd     = document.getElementById('turn-indicator');
  var elAngleDisp   = document.getElementById('angle-display');
  var elMsgBar      = document.getElementById('message-bar');
  var elOverlay     = document.getElementById('overlay');
  var elOvTitle     = document.getElementById('overlay-title');
  var elOvSub       = document.getElementById('overlay-sub');
  var elBtnFire     = document.getElementById('btn-fire');
  var elBtnUp       = document.getElementById('btn-up');
  var elBtnDown     = document.getElementById('btn-down');
  var elBtnReset    = document.getElementById('btn-reset');
  var elBtnRestart  = document.getElementById('btn-restart');
  var elPowerSlider = document.getElementById('power-slider');
  var elPowerVal    = document.getElementById('power-val');
  var elMoveDisp    = document.getElementById('move-display');

  var canvas = document.getElementById('canvas');
  var ctx    = canvas.getContext('2d');
  canvas.width  = W;
  canvas.height = H;

  // ── State ──────────────────────────────────────────────────────────────────
  var redTank, blueTank, turn, projectile, animId, explosions, gameOver;

  // ── Tank ───────────────────────────────────────────────────────────────────
  function Tank(side) {
    this.side     = side;
    this.hp       = MAX_HP;
    this.score    = 0;
    this.color    = side === 'red' ? '#e63030' : '#1a70e6';
    this.barrel   = side === 'red' ? '#b01818' : '#0848b0';
    this.angle    = side === 'red' ? 45 : 135;
    this.moveUsed = 0;  // pixels moved this turn
    var zone = W / 3;
    if (side === 'red') {
      this.x = 40 + Math.random() * (zone - 80);
    } else {
      this.x = W - zone + 40 + Math.random() * (zone - 80);
    }
    this.y = GROUND_Y;
  }

  Tank.prototype.barrelTip = function (len) {
    len = len || 30;
    var rad = this.angle * Math.PI / 180;
    return { x: this.x + Math.cos(rad) * len, y: this.y - Math.sin(rad) * len };
  };

  Tank.prototype.draw = function () {
    var x = this.x, y = this.y;

    // Shadow
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(x, y + 8, 30, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Tracks
    ctx.fillStyle = '#444';
    rrect(x - 24, y - 4, 48, 10, 4);
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    for (var i = -18; i <= 18; i += 9) {
      ctx.beginPath();
      ctx.moveTo(x + i, y - 4);
      ctx.lineTo(x + i, y + 6);
      ctx.stroke();
    }

    // Body
    ctx.fillStyle = this.color;
    rrect(x - 20, y - 18, 40, 16, 5);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    rrect(x - 18, y - 17, 36, 5, 3);
    ctx.fill();

    // Turret
    ctx.fillStyle = this.barrel;
    ctx.beginPath();
    ctx.arc(x, y - 20, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(x - 3, y - 23, 5, 0, Math.PI * 2);
    ctx.fill();

    // Barrel
    var rad = this.angle * Math.PI / 180;
    var tx  = x + Math.cos(rad) * 28;
    var ty  = y - Math.sin(rad) * 28;
    ctx.strokeStyle = this.barrel;
    ctx.lineWidth   = 5;
    ctx.lineCap     = 'round';
    ctx.beginPath();
    ctx.moveTo(x, y - 20);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    ctx.lineCap = 'butt';

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(this.side === 'red' ? '紅' : '藍', x, y - 17);
  };

  // ── Helpers ────────────────────────────────────────────────────────────────
  function rrect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function dist(ax, ay, bx, by) {
    var dx = ax - bx, dy = ay - by;
    return Math.sqrt(dx * dx + dy * dy);
  }

  // ── Terrain ────────────────────────────────────────────────────────────────
  var terrainPts = [];

  function buildTerrain() {
    terrainPts = [];
    var segs = 20;
    for (var i = 0; i <= segs; i++) {
      var px = (i / segs) * W;
      var py = GROUND_Y - 10 + Math.sin(i * 0.8) * 12 + Math.sin(i * 1.7 + 1) * 8;
      terrainPts.push({ x: px, y: py });
    }
  }

  function drawTerrain() {
    // Sky
    var sky = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    sky.addColorStop(0, '#0d1b3e');
    sky.addColorStop(1, '#1e3a5f');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    var stars = [[50,20],[120,45],[200,15],[310,35],[430,10],[550,30],[660,18],[720,40]];
    for (var s = 0; s < stars.length; s++) {
      ctx.beginPath();
      ctx.arc(stars[s][0], stars[s][1], 1, 0, Math.PI * 2);
      ctx.fill();
    }

    // Ground
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, terrainPts[0].y);
    for (var i = 0; i < terrainPts.length; i++) {
      ctx.lineTo(terrainPts[i].x, terrainPts[i].y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    var grd = ctx.createLinearGradient(0, GROUND_Y, 0, H);
    grd.addColorStop(0,   '#3a6b35');
    grd.addColorStop(0.3, '#2d5228');
    grd.addColorStop(1,   '#1a2e18');
    ctx.fillStyle = grd;
    ctx.fill();

    ctx.strokeStyle = '#5a9e50';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var j = 0; j < terrainPts.length; j++) {
      if (j === 0) ctx.moveTo(terrainPts[j].x, terrainPts[j].y);
      else         ctx.lineTo(terrainPts[j].x, terrainPts[j].y);
    }
    ctx.stroke();
  }

  // ── Explosions ─────────────────────────────────────────────────────────────
  function spawnExplosion(x, y, color, precise) {
    var count = precise ? 22 : 12;
    for (var i = 0; i < count; i++) {
      var spd = precise ? (2 + Math.random() * 5) : (1 + Math.random() * 3);
      var ang = Math.random() * Math.PI * 2;
      explosions.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 1,
        decay: 0.03 + Math.random() * 0.04,
        r: precise ? (3 + Math.random() * 4) : (2 + Math.random() * 3),
        color: color
      });
    }
    explosions.push({ type: 'ring', x: x, y: y, r: 4, maxR: precise ? 40 : 22, life: 1, color: color });
  }

  function updateDrawExplosions() {
    for (var i = explosions.length - 1; i >= 0; i--) {
      var e = explosions[i];
      if (e.type === 'ring') {
        e.r    += (e.maxR - e.r) * 0.18;
        e.life -= 0.06;
        ctx.save();
        ctx.globalAlpha = Math.max(0, e.life * 0.7);
        ctx.strokeStyle = e.color;
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      } else {
        e.x  += e.vx;
        e.y  += e.vy;
        e.vy += GRAVITY * 0.5;
        e.life -= e.decay;
        ctx.save();
        ctx.globalAlpha = Math.max(0, e.life);
        ctx.fillStyle   = e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      if (e.life <= 0) explosions.splice(i, 1);
    }
  }

  // ── UI update ──────────────────────────────────────────────────────────────
  function updateUI() {
    elRedScore.textContent  = 'HP ' + redTank.hp  + ' | 得分 ' + redTank.score;
    elBlueScore.textContent = 'HP ' + blueTank.hp + ' | 得分 ' + blueTank.score;
    elRedHpBar.style.width  = (redTank.hp  / MAX_HP * 100) + '%';
    elBlueHpBar.style.width = (blueTank.hp / MAX_HP * 100) + '%';

    var current = turn === 'red' ? redTank : blueTank;
    elAngleDisp.textContent = Math.round(current.angle) + '°';
    elAngleDisp.style.color = turn === 'red' ? '#ff6666' : '#66b3ff';

    // Move budget display
    var remaining = MAX_MOVE - current.moveUsed;
    elMoveDisp.textContent = remaining + 'px';
    elMoveDisp.style.color = remaining > 0 ? '#aaffaa' : '#ff8888';

    if (gameOver) {
      elTurnInd.textContent = '遊戲結束';
      elTurnInd.style.background = '#333';
      elTurnInd.style.color = '#f5c518';
    } else if (turn === 'red') {
      elTurnInd.textContent = '▶ 紅軍回合';
      elTurnInd.style.background = '#e63030';
      elTurnInd.style.color = '#fff';
    } else {
      elTurnInd.textContent = '藍軍回合 ◀';
      elTurnInd.style.background = '#1a70e6';
      elTurnInd.style.color = '#fff';
    }

    var busy = (projectile !== null) || gameOver;
    elBtnFire.disabled     = busy;
    elBtnUp.disabled       = busy;
    elBtnDown.disabled     = busy;
    elPowerSlider.disabled = busy;
  }

  function showMessage(msg, color) {
    elMsgBar.textContent = msg;
    elMsgBar.style.color = color || '#f5c518';
  }

  // ── Tank movement ──────────────────────────────────────────────────────────
  function moveTank(dir) {
    // dir: +1 = right, -1 = left
    if (gameOver || projectile) return;
    var tank = turn === 'red' ? redTank : blueTank;
    var remaining = MAX_MOVE - tank.moveUsed;
    if (remaining <= 0) {
      showMessage('⛔ 本回合移動已達上限（20px）', '#ff8888');
      return;
    }
    if (tank.score <= 0) {
      showMessage('⛔ 得分不足，無法移動', '#ff8888');
      return;
    }
    // Boundary: keep tank body within canvas
    var newX = tank.x + dir;
    if (newX < 26 || newX > W - 26) return;
    tank.x = newX;
    tank.moveUsed += 1;
    tank.score    -= 1;
    drawScene();
    updateUI();
  }

  // ── Angle control ──────────────────────────────────────────────────────────
  function changeAngle(delta) {
    if (gameOver || projectile) return;
    var current = turn === 'red' ? redTank : blueTank;
    if (turn === 'red') {
      current.angle = Math.min(170, Math.max(10, current.angle + delta));
    } else {
      current.angle = Math.min(170, Math.max(10, current.angle - delta));
    }
    drawScene();
    updateUI();
  }

  // ── Fire ───────────────────────────────────────────────────────────────────
  function fire() {
    if (projectile || gameOver) return;
    var attacker = turn === 'red' ? redTank : blueTank;
    var power    = parseInt(elPowerSlider.value, 10) / 100;
    var speed    = 8 + power * 10;
    var rad      = attacker.angle * Math.PI / 180;
    var tip      = attacker.barrelTip(32);

    projectile = {
      x:     tip.x,
      y:     tip.y,
      vx:    Math.cos(rad) * speed,
      vy:   -Math.sin(rad) * speed,
      owner: turn,
      trail: []
    };

    showMessage('💨 砲彈飛行中…', '#ccc');
    updateUI();
    requestAnimationFrame(step);
  }

  // ── Game loop ──────────────────────────────────────────────────────────────
  function step() {
    if (!projectile) {
      drawScene();
      return;
    }

    // Store trail
    projectile.trail.push({ x: projectile.x, y: projectile.y });
    if (projectile.trail.length > TRAIL_LEN) projectile.trail.shift();

    // Move
    projectile.x  += projectile.vx;
    projectile.y  += projectile.vy;
    projectile.vy += GRAVITY;

    var attacker = projectile.owner === 'red' ? redTank : blueTank;
    var target   = projectile.owner === 'red' ? blueTank : redTank;

    // ── Shape-based hit detection ──────────────────────────────────────────
    // Test the trajectory segment (prev frame → current frame) against each
    // part of the tank so fast shells never tunnel through.
    //
    // Precise : turret circle  (cx=tx, cy=ty-20, r=11)
    //           body rectangle (tx-20 ~ tx+20, ty-18 ~ ty-2)
    // Range   : track rectangle (tx-24 ~ tx+24, ty-4 ~ ty+6)

    var tx = target.x, ty = target.y;

    // Previous projectile position (before this frame's move)
    var x0 = projectile.x - projectile.vx;
    var y0 = projectile.y - (projectile.vy - GRAVITY); // vy already includes this frame's gravity
    var x1 = projectile.x, y1 = projectile.y;

    // --- helpers ---
    // Closest point on segment (x0,y0)→(x1,y1) to point (px,py)
    function closestOnSeg(px, py) {
      var sdx = x1 - x0, sdy = y1 - y0;
      var len2 = sdx * sdx + sdy * sdy;
      if (len2 === 0) return { x: x0, y: y0 };
      var t = Math.max(0, Math.min(1, ((px - x0) * sdx + (py - y0) * sdy) / len2));
      return { x: x0 + t * sdx, y: y0 + t * sdy };
    }

    // Minimum distance from segment to circle centre
    function segToCircleDist(cx, cy) {
      var cp = closestOnSeg(cx, cy);
      return dist(cp.x, cp.y, cx, cy);
    }

    // Minimum distance from segment to axis-aligned rectangle
    // (clamp closest seg point into rect, then measure)
    function segToRectDist(rx1, ry1, rx2, ry2) {
      // sample several points along the segment for robustness
      var minD = Infinity;
      var steps = 8;
      for (var si = 0; si <= steps; si++) {
        var frac = si / steps;
        var sx = x0 + (x1 - x0) * frac;
        var sy = y0 + (y1 - y0) * frac;
        var cx2 = Math.max(rx1, Math.min(rx2, sx));
        var cy2 = Math.max(ry1, Math.min(ry2, sy));
        var d2 = dist(sx, sy, cx2, cy2);
        if (d2 < minD) minD = d2;
      }
      return minD;
    }

    // Turret: circle at (tx, ty-20) r=11
    var dTurret = segToCircleDist(tx, ty - 20);
    var hitTurret = dTurret <= 11;

    // Body: rect x∈[tx-20, tx+20], y∈[ty-18, ty-2]
    var dBody = segToRectDist(tx - 20, ty - 18, tx + 20, ty - 2);
    var hitBody = dBody <= 0; // inside or touching rect

    // Track: rect x∈[tx-24, tx+24], y∈[ty-4, ty+6]
    var dTrack = segToRectDist(tx - 24, ty - 4, tx + 24, ty + 6);
    var hitTrack = dTrack <= 0;

    var hit = false;

    if (hitTurret || hitBody) {
      // Precise hit — turret or body contact
      hit = true;
      attacker.score += 5;
      target.hp = Math.max(0, target.hp - 5);
      spawnExplosion(projectile.x, projectile.y, '#ffd700', true);
      showMessage('🎯 精準命中！  +5分 / 對方 -5HP', '#ffd700');
    } else if (hitTrack) {
      // Range hit — track contact only
      hit = true;
      attacker.score += 2;
      target.hp = Math.max(0, target.hp - 2);
      spawnExplosion(projectile.x, projectile.y, '#ff8c00', false);
      showMessage('💥 範圍命中（履帶）！  +2分 / 對方 -2HP', '#ff8c00');
    }

    // Out of bounds / ground
    if (!hit && (projectile.y > GROUND_Y + 8 || projectile.x < -10 || projectile.x > W + 10)) {
      if (projectile.y > GROUND_Y) {
        spawnExplosion(projectile.x, GROUND_Y - 2, '#8B6914', false);
        showMessage('🪨 落地未命中', '#888');
      } else {
        showMessage('🌊 砲彈飛出邊界', '#888');
      }
      hit = true;
    }

    drawScene();

    if (hit) {
      projectile = null;
      updateUI();

      if (target.hp <= 0) {
        endGame(attacker.side);
        return;
      }

      turn = turn === 'red' ? 'blue' : 'red';
      // Reset move budget for the new turn
      var nextTank = turn === 'red' ? redTank : blueTank;
      nextTank.moveUsed = 0;
      updateUI();
      return;
    }

    animId = requestAnimationFrame(step);
  }

  // ── Draw scene ─────────────────────────────────────────────────────────────
  function drawScene() {
    ctx.clearRect(0, 0, W, H);
    drawTerrain();

    redTank.draw();
    blueTank.draw();

    // Hit zone indicator on target — drawn AFTER tanks so it overlays cleanly
    if (!projectile && !gameOver) {
      var tgt = turn === 'red' ? blueTank : redTank;
      var tx2 = tgt.x, ty2 = tgt.y;
      ctx.save();
      ctx.setLineDash([4, 4]);
      ctx.lineDashOffset = 0;
      ctx.lineWidth = 1;

      // Track rect (range hit) — orange
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = '#ff8844';
      ctx.strokeRect(tx2 - 24, ty2 - 4, 48, 10);

      // Body rect (precise hit) — gold
      ctx.globalAlpha = 0.55;
      ctx.strokeStyle = '#ffd700';
      ctx.strokeRect(tx2 - 20, ty2 - 18, 40, 16);

      ctx.restore();
      // Explicitly reset lineDash after restore (some browsers don't restore it)
      ctx.setLineDash([]);
    }

    // Projectile trail + ball
    if (projectile) {
      ctx.setLineDash([]); // ensure no dash pattern from previous draw
      var trailColor = projectile.owner === 'red' ? 'rgba(255,120,80,' : 'rgba(80,160,255,';
      for (var i = 0; i < projectile.trail.length; i++) {
        var t   = projectile.trail[i];
        var pct = (i + 1) / projectile.trail.length;
        var tr  = 1 + pct * 2.5;
        ctx.globalAlpha = pct * 0.75;
        ctx.fillStyle   = trailColor + '1)';
        ctx.beginPath();
        ctx.arc(t.x, t.y, tr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // Glowing ball — use shadow only on the ball itself
      ctx.save();
      ctx.setLineDash([]);
      ctx.shadowColor = projectile.owner === 'red' ? '#ff4444' : '#4488ff';
      ctx.shadowBlur  = 12;
      ctx.fillStyle   = '#ffffff';
      ctx.beginPath();
      ctx.arc(projectile.x, projectile.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.shadowBlur = 0; // always clear shadow after use
    }

    updateDrawExplosions();
    updateUI();
  }

  // ── Game lifecycle ─────────────────────────────────────────────────────────
  function startGame() {
    cancelAnimationFrame(animId);
    animId     = null;
    buildTerrain();
    redTank    = new Tank('red');
    blueTank   = new Tank('blue');
    turn       = Math.random() < 0.5 ? 'red' : 'blue';
    projectile = null;
    explosions = [];
    gameOver   = false;
    // Reset move budget for first turn
    var firstTank = turn === 'red' ? redTank : blueTank;
    firstTank.moveUsed = 0;

    elOverlay.classList.remove('show');
    elPowerSlider.value = 60;
    elPowerVal.textContent = '60%';

    showMessage(
      turn === 'red' ? '🔴 紅軍先手！' : '🔵 藍軍先手！',
      turn === 'red' ? '#ff6666' : '#66b3ff'
    );
    drawScene();
  }

  function endGame(winner) {
    gameOver = true;
    if (winner === 'red') {
      elOvTitle.textContent = '🔴 紅軍勝利！';
      elOvTitle.style.color = '#ff4d4d';
    } else {
      elOvTitle.textContent = '🔵 藍軍勝利！';
      elOvTitle.style.color = '#4da6ff';
    }
    var w = winner === 'red' ? redTank : blueTank;
    var l = winner === 'red' ? blueTank : redTank;
    elOvSub.textContent = '勝者得分：' + w.score + '　敗者剩餘 HP：' + l.hp;
    elOverlay.classList.add('show');
    updateUI();
  }

  // ── Event listeners ────────────────────────────────────────────────────────
  elBtnUp.addEventListener('click',      function () { changeAngle(5);  });
  elBtnDown.addEventListener('click',    function () { changeAngle(-5); });
  elBtnFire.addEventListener('click',    fire);
  elBtnReset.addEventListener('click',   startGame);
  elBtnRestart.addEventListener('click', startGame);

  elPowerSlider.addEventListener('input', function () {
    elPowerVal.textContent = elPowerSlider.value + '%';
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft')              { e.preventDefault(); moveTank(-1); }
    if (e.key === 'ArrowRight')             { e.preventDefault(); moveTank(+1); }
    if (e.key === 'ArrowUp')               { e.preventDefault(); changeAngle(5);  }
    if (e.key === 'ArrowDown')             { e.preventDefault(); changeAngle(-5); }
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); fire();         }
  });

  // ── Boot ───────────────────────────────────────────────────────────────────
  startGame();

})(); // IIFE — no globals
</script>
</body>
</html>
